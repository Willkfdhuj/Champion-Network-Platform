<!DOCTYPE html>
<html>

<head>

    <title>Champion Network Games</title>

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/games.css">

</head>


<body>


<header>

    <h1>🏆 Champion Network Games 🏆</h1>

    <nav>
        <a href="index.html">Home</a>
        <a href="games.html">Games</a>
        <a href="profile.html">Profile</a>
        <a href="leaderboard.html">Leaderboard</a>
        <a href="https://discord.gg/BNe7FBxJJ" target="_blank">Discord</a>
    </nav>

</header>



<section class="hero">

    <h2>🎮 Game Library</h2>

    <input 
        id="search"
        type="text"
        placeholder="Search games..."
    >

</section>



<div class="games-container" id="games">

</div>



<script src="js/games.js"></script>


<script>

const container = document.getElementById("games");


games.forEach(game => {

    container.innerHTML += `

        <div class="game-card">

            <img src="${game.image}" alt="${game.name}">

            <h2>${game.name}</h2>

            <a href="play.html?game=${game.id}">
                <button>Play</button>
            </a>

        </div>

    `;

});

</script>


</body>

</html>
