<!DOCTYPE html>
<html>

<head>
    <title>Champion Network Games</title>

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/games.css">
</head>


<body>

<header>

    <h1>🏆 Champion Network Games 🏆</h1>

    <nav>
        <a href="index.html">Home</a>
    </nav>

</header>



<section class="hero">

    <h2>🎮 Game Library</h2>

    <input 
        id="search"
        type="text"
        placeholder="Search games..."
    >

</section>



<div class="games-container" id="games">


<div class="game-card">
    <img src="images/games/geometrydash.jpg">
    <h3>Geometry Dash</h3>
    <a href="play.html?game=geometrydash">
        <button>Play</button>
    </a>
</div>


<div class="game-card">
    <img src="images/games/slope.jpg">
    <h3>Slope</h3>
    <a href="play.html?game=slope">
        <button>Play</button>
    </a>
</div>


<div class="game-card">
    <img src="images/games/basketballbros.jpg">
    <h3>Basketball Bros</h3>
    <a href="play.html?game=basketballbros">
        <button>Play</button>
    </a>
</div>


<div class="game-card">
    <img src="images/games/run3.jpg">
    <h3>Run 3</h3>
    <a href="play.html?game=run3">
        <button>Play</button>
    </a>
</div>


<div class="game-card">
    <img src="images/games/tetris.jpg">
    <h3>Tetris</h3>
    <a href="play.html?game=tetris">
        <button>Play</button>
    </a>
</div>


<div class="game-card">
    <img src="images/games/2048.jpg">
    <h3>2048</h3>
    <a href="play.html?game=2048">
        <button>Play</button>
    </a>
</div>


</div>



<script>

const search = document.getElementById("search");

const games = document.querySelectorAll(".game-card");


search.addEventListener("input", () => {

    let value = search.value.toLowerCase();


    games.forEach(game => {

        let name = game.innerText.toLowerCase();


        if(name.includes(value)){
            game.style.display = "block";
        }
        else{
            game.style.display = "none";
        }

    });

});

</script>



</body>
</html>
