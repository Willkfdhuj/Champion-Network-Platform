<!DOCTYPE html>
<html>

<head>

    <title>Champion Network Play</title>

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/play.css">

</head>


<body>


<header>

    <h1 id="title">Loading Game...</h1>

    <nav>
        <a href="games.html">⬅ Back to Games</a>
    </nav>

</header>



<main class="game-container">

    <iframe 
        id="game"
        allowfullscreen
        frameborder="0">
    </iframe>

</main>



<script src="js/games.js"></script>


<script>

const params = new URLSearchParams(window.location.search);

const gameID = params.get("game");


const game = games.find(g => g.id === gameID);

    console.log(game);

if(game){

    document.getElementById("title").innerText = game.name;


    if(game.url){

        document.getElementById("game").src = game.url;

    } else {

        document.getElementById("game").src = "";

        alert("Game URL not added yet!");

    }

}

else {

    document.getElementById("title").innerText = "Game Not Found";

}


</script>


</body>

</html>
